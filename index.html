  <script>
    // Hamburger Menu
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      const icon = hamburger.querySelector('i');
      icon.classList.toggle('fa-bars');
      icon.classList.toggle('fa-times');
    });

    document.querySelectorAll('#mobileMenu a').forEach(link => {
      link.addEventListener('click', () => {
        mobileMenu.classList.add('hidden');
        const icon = hamburger.querySelector('i');
        icon.classList.add('fa-bars');
        icon.classList.remove('fa-times');
      });
    });

    // Appointment Modal
    function openAppointmentModal() {
      document.getElementById('appointmentModal').classList.remove('hidden');
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('date').setAttribute('min', today);
    }

    function closeAppointmentModal() {
      document.getElementById('appointmentModal').classList.add('hidden');
    }

    function closeSuccessMessage() {
      document.getElementById('successMessage').classList.add('hidden');
      closeAppointmentModal();
    }

    function handleSubmit(e) {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const email = document.getElementById('email').value || "Not provided";
      const date = document.getElementById('date').value;
      const time = document.getElementById('time').value;
      const service = document.getElementById('service').value;
      const message = document.getElementById('message').value || "No additional message";

      const whatsappMessage = `🩺 *New Appointment Request from MoonMed Website*%0A%0A` +
                              `*Name:* ${name}%0A` +
                              `*Phone:* ${phone}%0A` +
                              `*Email:* ${email}%0A` +
                              `*Date:* ${date}%0A` +
                              `*Time:* ${time}%0A` +
                              `*Service:* ${service}%0A%0A` +
                              `*Message:* ${message}`;

      const whatsappNumber = "27649851938";

      window.open(`https://wa.me/${whatsappNumber}?text=${whatsappMessage}`, '_blank');

      document.getElementById('appointmentForm').reset();
      closeAppointmentModal();
    }

    document.getElementById('appointmentModal').addEventListener('click', function(e) {
      if (e.target === this) closeAppointmentModal();
    });
  </script>
</body>
</html>

  <style>
    * {
      margin: 0;

    }

      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

      display: inline-block;
      background: rgba(255,255,255,0.2);

      font-size: 0.9rem;

  </style>
</head>
